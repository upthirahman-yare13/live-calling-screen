<div class="display-container" style="text-align: center; color: white; padding: 20px;">
    <h1>BUKAANKA HADDA</h1>
    <h2 id="patient-name" style="font-size: 50px; color: #fbbf24;">Loading...</h2>
    
    <div style="margin: 20px 0; font-size: 24px;">
        Dhakhtarka: <span id="doctor-name" style="color: #60a5fa;">...</span>
    </div>
    
    <div class="qolka-box" style="background: #2563eb; padding: 15px; border-radius: 10px; display: inline-block;">
        QOLKA: <span id="room-num">--</span>
    </div>
</div>

<script type="module">
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js";
  
  const db = firebase.database();
  const queueRef = ref(db, 'live_queue');
  
  onValue(queueRef, (snapshot) => {
    const data = snapshot.val();
    if(data) {
        document.getElementById("patient-name").innerText = data.name;
        document.getElementById("doctor-name").innerText = "Dr. " + data.doctor; // Halkan ayaan ku daray
        document.getElementById("room-num").innerText = data.room;
    }
  });
</script>
