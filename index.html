<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyB5LuhewiHycIpkMWq-3HUW8yRlsSy4fLA", 
        databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com",
        projectId: "carequeue-manager"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Akhrinta xogta tooska ah (Live Queue)
    db.ref('live_queue').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('liveNum').innerText = data.num;
            document.getElementById('liveName').innerText = data.name;
            document.getElementById('liveRoom').innerText = data.room;
            document.getElementById('liveDoc').innerText = data.doctor;
            
            // JOOJI CODKII HORE HADDII UU SOCDO
            window.speechSynthesis.cancel();

            // DIYAARI FARRIINTA (English)
            const textToSpeak = `Ticket number ${data.num}, ${data.name}. Please go to room ${data.room}. Doctor ${data.doctor} is waiting for you.`;
            const msg = new SpeechSynthesisUtterance(textToSpeak);
            msg.lang = 'en-US'; // Codka English
            msg.rate = 0.8;      // Tartiib
            
            // CODKA OO 3 JEER SOO LABA-LABAANAYA
            let count = 0;
            msg.onend = function() {
                count++;
                if (count < 3) {
                    setTimeout(() => {
                        window.speechSynthesis.speak(msg);
                    }, 2000); // 2 ilbiriqsi u dhaxayso wicitaannada
                }
            };

            window.speechSynthesis.speak(msg);
        }
    });
</script>
