<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | TV Display</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .tv-card { text-align: center; width: 90%; border: 10px solid #2563eb; padding: 50px; border-radius: 40px; box-shadow: 0 0 50px rgba(37, 99, 235, 0.3); }
        .num { font-size: 250px; color: #fbbf24; font-weight: 900; margin: 0; line-height: 1; }
        .name { font-size: 80px; margin: 20px 0; text-transform: capitalize; }
        .room { background: #2563eb; padding: 20px 80px; border-radius: 100px; font-size: 60px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>
    <div class="tv-card">
        <div style="font-size: 40px; color: #94a3b8; letter-spacing: 5px;">BUKAANKA HADDA</div>
        <div class="num" id="dNum">---</div>
        <div class="name" id="dName">Sugitaanka...</div>
        <div class="room">QOLKA: <span id="dRoom">0</span></div>
    </div>

    <script>
        // HALKAN GELI CONFIG-GAAGA FIREBASE EE GAARKA AH
        const firebaseConfig = { databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('live_queue').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('dNum').innerText = data.num;
                document.getElementById('dName').innerText = data.name;
                document.getElementById('dRoom').innerText = data.room;
                
                // Codka Faseexda ah
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(`Bukaan ${data.name}, lambar ${data.num}, fadlan gal qolka ${data.room}`);
                msg.lang = 'so-SO'; msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }
        });
    </script>
</body>
</html>
