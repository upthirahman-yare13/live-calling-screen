<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>CareQueue | TV Display</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --blue: #2563eb; --gold: #fbbf24; --dark: #0f172a; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .header { font-size: 40px; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; }
        .live-card { background: #1e293b; padding: 50px; border-radius: 30px; border: 8px solid var(--blue); display: inline-block; width: 85%; margin: 0 auto; }
        .ticket-num { font-size: 220px; color: var(--gold); font-weight: bold; margin: 0; }
        .patient-name { font-size: 70px; margin: 20px 0; }
        .info-row { display: flex; justify-content: space-around; align-items: center; margin-top: 30px; }
        .room-box { font-size: 50px; background: var(--blue); padding: 15px 40px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header">Hadda Waxaa la Sugayaa (Now Calling)</div>

    <div class="live-card">
        <p class="ticket-num" id="liveNum">--</p>
        <p class="patient-name" id="liveName">Sugitaanka...</p>
        <div class="info-row">
            <div class="room-box">ROOM: <span id="liveRoom">--</span></div>
            <div id="liveDoc" style="font-size: 40px; color: var(--gold);">--</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB5LuhewiHycIpkMWq-3HUW8yRlsSy4fLA", 
            databaseURL: "https://carequeue-manager-default-rtdb.firebaseio.com",
            projectId: "carequeue-manager"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Xiriirinta Database-ka iyo Codka 3-da jeer
        db.ref('live_queue').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                // Cusboonaysiinta shaashadda
                document.getElementById('liveNum').innerText = data.num;
                document.getElementById('liveName').innerText = data.name;
                document.getElementById('liveRoom').innerText = data.room;
                document.getElementById('liveDoc').innerText = "Dr. " + data.doctor;
                
                // Codka 3-da jeer (English Male Voice)
                window.speechSynthesis.cancel(); // Jooji haddii cod kale socdo
                let count = 0;
                
                function speak() {
                    if(count < 3) {
                        const msg = new SpeechSynthesisUtterance(`Attention, patient ${data.name}. Please proceed to room ${data.room}.`);
                        msg.lang = 'en-US';
                        msg.rate = 0.8; // Cod fasiix ah
                        msg.onend = () => { 
                            count++; 
                            if(count < 3) setTimeout(speak, 1000); 
                        };
                        window.speechSynthesis.speak(msg);
                    }
                }
                speak();
            } else {
                document.getElementById('liveNum').innerText = "--";
                document.getElementById('liveName').innerText = "Ma jiro bukaan hadda la sugayo";
            }
        });
    </script>
</body>
</html>
